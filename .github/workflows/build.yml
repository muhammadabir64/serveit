name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
            allow_failure: false
            files: |
              dist/*.exe
              dist/*.yml
              dist/*.blockmap
          - os: ubuntu-latest
            script: dist:linux:all
            allow_failure: true
            files: |
              dist/*.deb
              dist/*.AppImage
              dist/*.yml

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure }}

    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run ${{ matrix.script }}

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


